<div class="survey-card">
  <div class="survey-top">
    <p-tag [value]="statusLabel()" [severity]="tagSeverity(survey().status)" [rounded]="true" />
    <div class="row-actions">
      <p-button icon="pi pi-eye"    rounded text severity="secondary" size="small" (onClick)="view.emit()" />
      <p-button icon="pi pi-pencil" rounded text severity="secondary" size="small" (onClick)="edit.emit()" />
      <p-button icon="pi pi-trash"  rounded text severity="danger"    size="small" (onClick)="delete.emit()" />
    </div>
  </div>
  <h3 class="survey-title">{{ survey().title }}</h3>
  <p class="survey-desc">{{ survey().description }}</p>
  <div class="survey-meta">
    <div><i class="pi pi-users" style="font-size:14px"></i> {{ survey().audience }}</div>
    <div><i class="pi pi-list"  style="font-size:14px"></i> {{ survey().questions }} вопр.</div>
    <div><i class="pi pi-calendar" style="font-size:14px"></i> до {{ fmt(survey().endDate) }}</div>
  </div>
  <div class="survey-progress">
    <div class="sp-head">
      <span class="muted text-sm">Прохождение</span>
      <span class="fw-600">{{ survey().responses }} / {{ survey().totalRecipients }}</span>
    </div>
    <p-progressBar [value]="responseRate()" [showValue]="false" styleClass="survey-bar" />
    <div class="muted text-sm sp-pct">{{ responseRate() }}%</div>
  </div>
</div>
