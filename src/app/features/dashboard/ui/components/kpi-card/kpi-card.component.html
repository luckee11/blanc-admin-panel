<div class="kpi">
  <div class="kpi-head">
    <span class="kpi-icon" [class]="'icon-' + iconColor()">
      <ui-icon [name]="icon()" />
    </span>
    @if (delta()) {
      <span class="kpi-delta" [class.up]="deltaType() === 'up'" [class.down]="deltaType() === 'down'">
        {{ delta() }}
      </span>
    }
  </div>
  <div class="kpi-value">{{ value() }}</div>
  <div class="kpi-label">{{ label() }}</div>
</div>
