<ui-page-header title="Контакты" subtitle="Внутренние и внешние контакты для коммуникаций">
  <p-button label="Новый контакт" icon="pi pi-plus" (onClick)="openCreate()" />
</ui-page-header>

<div class="card prim-table-card">
  <p-table #dt [value]="contacts()" [paginator]="true" [rows]="10" [rowsPerPageOptions]="[10,25,50]"
           [globalFilterFields]="['name','email','position','department']"
           sortMode="single" [showCurrentPageReport]="true"
           currentPageReportTemplate="Показано {first}–{last} из {totalRecords}" dataKey="id">
    <ng-template pTemplate="caption">
      <div class="table-toolbar">
        <p-iconfield>
          <p-inputicon styleClass="pi pi-search" />
          <input pInputText type="text" placeholder="Поиск..." [(ngModel)]="globalFilter"
                 (input)="dt.filterGlobal($any($event.target).value, 'contains')" />
        </p-iconfield>
        <p-select [options]="typeOptions" [(ngModel)]="selectedType"
                  optionLabel="label" optionValue="value" placeholder="Все типы"
                  (onChange)="dt.filter(selectedType, 'type', 'equals')" />
      </div>
    </ng-template>
    <ng-template pTemplate="header">
      <tr>
        <th pSortableColumn="name" style="min-width:180px">Контакт <p-sortIcon field="name" /></th>
        <th pSortableColumn="position" style="min-width:160px">Должность <p-sortIcon field="position" /></th>
        <th style="min-width:160px">Отдел / Компания</th>
        <th style="min-width:180px">Email</th>
        <th style="min-width:130px">Телефон</th>
        <th style="min-width:110px">Тип</th>
        <th style="width:90px; text-align:right">Действия</th>
      </tr>
    </ng-template>
    <ng-template pTemplate="body" let-c>
      <tr>
        <td>
          <div class="cell-emp">
            <p-avatar [label]="ini(c.name)" shape="circle" />
            <div class="fw-600">{{ c.name }}</div>
          </div>
        </td>
        <td>{{ c.position }}</td>
        <td>{{ c.department }}</td>
        <td>{{ c.email }}</td>
        <td>{{ c.phone }}</td>
        <td><p-tag [value]="typeLabel(c.type)" [severity]="tagSeverity(c.type)" [rounded]="true" /></td>
        <td>
          <div class="row-actions" style="justify-content:flex-end">
            <p-button icon="pi pi-pencil" rounded text severity="secondary" size="small" pTooltip="Редактировать" tooltipPosition="top" (onClick)="openEdit(c)" />
            <p-button icon="pi pi-trash"  rounded text severity="danger"    size="small" pTooltip="Удалить"       tooltipPosition="top" (onClick)="openDelete(c)" />
          </div>
        </td>
      </tr>
    </ng-template>
    <ng-template pTemplate="emptymessage">
      <tr><td colspan="7">
        <div class="empty-state">
          <div class="icon-wrap"><i class="pi pi-phone" style="font-size:22px"></i></div>
          <h3>Контакты не найдены</h3>
        </div>
      </td></tr>
    </ng-template>
  </p-table>
</div>

<!-- Form modal -->
<ui-modal [visible]="modal() === 'form'"
          [title]="editing()?.id ? 'Редактирование' : 'Новый контакт'"
          size="md" (close)="closeModal()">
  <div class="form-grid">
    <div class="field"><label class="field-label">Имя *</label><input pInputText [(ngModel)]="form.name" /></div>
    <div class="field"><label class="field-label">Должность</label><input pInputText [(ngModel)]="form.position" /></div>
    <div class="field"><label class="field-label">Email *</label><input pInputText type="email" [(ngModel)]="form.email" /></div>
    <div class="field"><label class="field-label">Телефон</label><input pInputText [(ngModel)]="form.phone" /></div>
    <div class="field"><label class="field-label">Отдел / Компания</label><input pInputText [(ngModel)]="form.department" /></div>
    <div class="field">
      <label class="field-label">Тип</label>
      <p-select [options]="typeFormOptions" [(ngModel)]="form.type" optionLabel="label" optionValue="value" [fluid]="true" />
    </div>
  </div>
  <ng-container footer>
    <p-button label="Отмена" severity="secondary" text (onClick)="closeModal()" />
    <p-button [label]="editing()?.id ? 'Сохранить' : 'Создать'" (onClick)="save()" [disabled]="!canSave()" />
  </ng-container>
</ui-modal>

<ui-confirm-delete [visible]="modal() === 'delete'"
                   [entity]="editing()?.name ?? ''"
                   (confirm)="doDelete()" (cancel)="closeModal()" />
