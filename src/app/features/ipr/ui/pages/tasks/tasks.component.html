<ui-page-header title="Задачи ИПР" subtitle="Конкретные задачи (пункты) в рамках планов развития">
  <p-button label="Обновить" icon="pi pi-refresh" severity="secondary" (onClick)="refresh()" />
</ui-page-header>

<div class="card prim-table-card">
  <p-table [value]="tasks()" [lazy]="true" [loading]="loading()"
           [paginator]="true" [rows]="10" [rowsPerPageOptions]="[10,25,50]"
           [totalRecords]="pagination()?.totalCount ?? 0"
           [showCurrentPageReport]="true"
           currentPageReportTemplate="Показано {first}–{last} из {totalRecords}"
           (onLazyLoad)="onLazyLoad($event)" dataKey="id">
    <ng-template pTemplate="caption">
      <div class="table-toolbar">
        <p-iconfield>
          <p-inputicon styleClass="pi pi-search" />
          <input pInputText type="text" placeholder="Поиск по задаче или сотруднику..."
                 [(ngModel)]="searchKeyword" (input)="onSearchInput()" />
        </p-iconfield>
        <p-select [options]="statusOptions" [(ngModel)]="selectedStatus"
                  optionLabel="label" optionValue="value" placeholder="Все статусы"
                  (onChange)="onFilterChange()" />
        <p-select [options]="priorityOptions" [(ngModel)]="selectedPriority"
                  optionLabel="label" optionValue="value" placeholder="Любой приоритет"
                  (onChange)="onFilterChange()" />
        <span class="muted text-sm table-count">
          Всего: <strong style="color:var(--c-text)">{{ pagination()?.totalCount ?? 0 }}</strong>
        </span>
      </div>
    </ng-template>
    <ng-template pTemplate="header">
      <tr>
        <th style="min-width:240px">Задача</th>
        <th style="min-width:180px">Сотрудник</th>
        <th style="min-width:80px">Год</th>
        <th style="min-width:110px">Приоритет</th>
        <th style="min-width:120px">Срок</th>
        <th style="min-width:150px">Статус</th>
        <th style="width:48px"></th>
      </tr>
    </ng-template>
    <ng-template pTemplate="body" let-t>
      <tr class="row-link" (click)="openPlan(t.planId)">
        <td>
          <div class="fw-600">{{ t.title }}</div>
          @if (t.expectedResult) { <div class="muted text-sm task-desc">{{ t.expectedResult }}</div> }
        </td>
        <td>
          <div class="cell-emp">
            <p-avatar [label]="ini(t.employee)" shape="circle" />
            <span>{{ fullName(t.employee) }}</span>
          </div>
        </td>
        <td>{{ t.year }}</td>
        <td><p-tag [value]="pLabel(t.priority)" [severity]="prioritySeverity(t.priority)" [rounded]="true" /></td>
        <td>{{ fmt(t.deadline) }}</td>
        <td><p-tag [value]="statusLabel(t.status)" [severity]="statusSeverity(t.status)" [rounded]="true" /></td>
        <td class="td-arrow"><i class="pi pi-chevron-right"></i></td>
      </tr>
    </ng-template>
    <ng-template pTemplate="emptymessage">
      <tr><td colspan="7">
        <div class="empty-state">
          <div class="icon-wrap"><i class="pi pi-check-square" style="font-size:22px"></i></div>
          <h3>Задач не найдено</h3>
        </div>
      </td></tr>
    </ng-template>
  </p-table>
</div>
