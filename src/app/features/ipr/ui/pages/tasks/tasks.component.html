<ui-page-header title="Задачи ИПР" subtitle="Конкретные задачи в рамках планов развития">
  <p-button label="Новая задача" icon="pi pi-plus" (onClick)="openCreate()" />
</ui-page-header>

<div class="card prim-table-card">
  <p-table #dt [value]="tasks()" [paginator]="true" [rows]="10" [rowsPerPageOptions]="[10,25,50]"
           [globalFilterFields]="['title','employeeName']"
           sortMode="single" [showCurrentPageReport]="true"
           currentPageReportTemplate="Показано {first}–{last} из {totalRecords}" dataKey="id">
    <ng-template pTemplate="caption">
      <div class="table-toolbar">
        <p-iconfield>
          <p-inputicon styleClass="pi pi-search" />
          <input pInputText type="text" placeholder="Поиск по задаче или сотруднику..."
                 [(ngModel)]="globalFilter"
                 (input)="dt.filterGlobal($any($event.target).value, 'contains')" />
        </p-iconfield>
        <p-select [options]="statusOptions" [(ngModel)]="selectedStatus"
                  optionLabel="label" optionValue="value" placeholder="Все статусы"
                  (onChange)="dt.filter(selectedStatus, 'status', 'equals')" />
        <p-select [options]="priorityOptions" [(ngModel)]="selectedPriority"
                  optionLabel="label" optionValue="value" placeholder="Любой приоритет"
                  (onChange)="dt.filter(selectedPriority, 'priority', 'equals')" />
      </div>
    </ng-template>
    <ng-template pTemplate="header">
      <tr>
        <th pSortableColumn="title"       style="min-width:220px">Задача <p-sortIcon field="title" /></th>
        <th pSortableColumn="employeeName" style="min-width:170px">Сотрудник <p-sortIcon field="employeeName" /></th>
        <th style="min-width:120px">Категория</th>
        <th style="min-width:110px">Приоритет</th>
        <th pSortableColumn="dueDate" style="min-width:120px">Срок <p-sortIcon field="dueDate" /></th>
        <th style="min-width:110px">Статус</th>
        <th style="width:90px; text-align:right">Действия</th>
      </tr>
    </ng-template>
    <ng-template pTemplate="body" let-t>
      <tr>
        <td>
          <div class="fw-600">{{ t.title }}</div>
          @if (t.description) { <div class="muted text-sm task-desc">{{ t.description }}</div> }
        </td>
        <td>
          <div class="cell-emp">
            <p-avatar [label]="ini(t.employeeName)" shape="circle" />
            <span>{{ t.employeeName }}</span>
          </div>
        </td>
        <td><p-tag [value]="catLabel(t.category)" severity="secondary" [rounded]="true" /></td>
        <td><p-tag [value]="pLabel(t.priority)"   [severity]="prioritySeverity(t.priority)" [rounded]="true" /></td>
        <td>{{ fmt(t.dueDate) }}</td>
        <td><p-tag [value]="label(t.status)" [severity]="statusSeverity(t.status)" [rounded]="true" /></td>
        <td>
          <div class="row-actions" style="justify-content:flex-end">
            <p-button icon="pi pi-pencil" rounded text severity="secondary" size="small" pTooltip="Редактировать" tooltipPosition="top" (onClick)="openEdit(t)" />
            <p-button icon="pi pi-trash"  rounded text severity="danger"    size="small" pTooltip="Удалить"       tooltipPosition="top" (onClick)="openDelete(t)" />
          </div>
        </td>
      </tr>
    </ng-template>
    <ng-template pTemplate="emptymessage">
      <tr><td colspan="7">
        <div class="empty-state">
          <div class="icon-wrap"><i class="pi pi-check-square" style="font-size:22px"></i></div>
          <h3>Задач не найдено</h3>
        </div>
      </td></tr>
    </ng-template>
  </p-table>
</div>

<!-- Form modal -->
<ui-modal [visible]="modal() === 'form'"
          [title]="editing()?.id ? 'Редактирование задачи' : 'Новая задача ИПР'"
          size="md" (close)="closeModal()">
  <div class="form-grid">
    <div class="field full"><label class="field-label">Название *</label><input pInputText [(ngModel)]="form.title" /></div>
    <div class="field"><label class="field-label">Сотрудник *</label><input pInputText [(ngModel)]="form.employeeName" /></div>
    <div class="field">
      <label class="field-label">Категория</label>
      <p-select [options]="categoryFormOpts" [(ngModel)]="form.category" optionLabel="label" optionValue="value" [fluid]="true" />
    </div>
    <div class="field">
      <label class="field-label">Приоритет</label>
      <p-select [options]="priorityFormOpts" [(ngModel)]="form.priority" optionLabel="label" optionValue="value" [fluid]="true" />
    </div>
    <div class="field"><label class="field-label">Срок</label><input pInputText type="date" [(ngModel)]="form.dueDate" /></div>
    <div class="field">
      <label class="field-label">Статус</label>
      <p-select [options]="statusFormOpts" [(ngModel)]="form.status" optionLabel="label" optionValue="value" [fluid]="true" />
    </div>
    <div class="field full"><label class="field-label">Описание</label><textarea pTextarea [(ngModel)]="form.description" [rows]="3" [autoResize]="true"></textarea></div>
  </div>
  <ng-container footer>
    <p-button label="Отмена" severity="secondary" text (onClick)="closeModal()" />
    <p-button [label]="editing()?.id ? 'Сохранить' : 'Создать'" (onClick)="save()" [disabled]="!canSave()" />
  </ng-container>
</ui-modal>

<ui-confirm-delete [visible]="modal() === 'delete'"
                   [entity]="editing()?.title ?? ''"
                   (confirm)="doDelete()" (cancel)="closeModal()" />
